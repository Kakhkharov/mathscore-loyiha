<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MathScore - Ro'yxatdan o'tish</title>
    
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#1a1a1a',
                        'primary-blue': '#4f46e5',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .bg-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7e22ce 100%);
        }
        .input-focus {
            @apply focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none;
        }
    </style>
</head>
<body class="bg-gradient min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Decorative Blobs -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl -ml-20 -mb-20"></div>

    <main class="glass max-w-md w-full rounded-[2.5rem] shadow-2xl p-10 z-10 animate-in fade-in zoom-in duration-500">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-20 h-20 bg-brand-dark rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-brand-dark/20">
                <div class="w-3 h-10 bg-white rounded-full"></div>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight text-center leading-tight">Yangi hisob yaratish</h1>
            <p class="text-gray-500 mt-2 text-sm">MathScore hamjamiyatiga qo'shiling</p>
        </div>

        <form action="#" class="space-y-5" method="POST">
            <!-- Full Name Input -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 ml-1" for="name">To'liq ismingiz</label>
                <input class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300" id="name" name="name" placeholder="Ism familiyangizni kiriting" required="" type="text"/>
            </div>

            <!-- Email Input -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 ml-1" for="email">Email manzilingiz</label>
                <input class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300" id="email" name="email" placeholder="example@gmail.com" required="" type="email"/>
            </div>

            <!-- Password Input -->
            <div class="space-y-1">
                <label class="block text-sm font-bold text-gray-700 ml-1" for="password">Parol o'rnating</label>
                <input class="w-full px-5 py-3.5 border border-gray-200 rounded-2xl bg-gray-50/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button class="w-full bg-brand-dark text-white font-bold py-4 px-6 rounded-2xl hover:bg-gray-800 transform active:scale-95 transition-all duration-200 shadow-lg shadow-brand-dark/20" type="submit">
                    Ro'yxatdan o'tish
                </button>
            </div>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 pt-8 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500 font-medium">
                Hisobingiz bormi? 
                <a class="text-indigo-600 font-bold hover:underline transition-colors" href="#">Kirish</a>
            </p>
        </div>
    </main>
</body>
</html>
