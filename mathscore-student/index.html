<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathScore - Talabalar Paneli</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-background text-on-background min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Xavfsizlik va F12, Right Click ni bloklash
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', function(event) {
        if (event.keyCode == 123) { // F12
          event.preventDefault(); return false;
        }
        if (event.ctrlKey && event.shiftKey && (event.keyCode == 73 || event.keyCode == 74 || event.keyCode == 67)) { // Ctrl+Shift+I/J/C
          event.preventDefault(); return false;
        }
        if (event.ctrlKey && event.keyCode == 85) { // Ctrl+U
          event.preventDefault(); return false;
        }
      });
    </script>
  </body>
</html>
