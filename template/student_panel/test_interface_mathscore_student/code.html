<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Test Taking Page - MathScore</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#00842e",
                        "on-tertiary-fixed-variant": "#005319",
                        "on-secondary-container": "#6b3900",
                        "error": "#ba1a1a",
                        "primary-fixed": "#e1e0ff",
                        "primary-container": "#5d5fef",
                        "on-tertiary-fixed": "#002106",
                        "on-primary-fixed": "#07006c",
                        "on-primary-fixed-variant": "#2e2bc2",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#dde4e6",
                        "primary": "#4343d5",
                        "on-error-container": "#93000a",
                        "surface-container": "#e8eff1",
                        "on-tertiary-container": "#e5ffe0",
                        "on-secondary-fixed-variant": "#6d3a00",
                        "surface-tint": "#4849da",
                        "surface": "#f4fafd",
                        "secondary-container": "#fc9d41",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#55e16b",
                        "secondary": "#8f4e00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#006822",
                        "on-primary-container": "#faf7ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#eef5f7",
                        "secondary-fixed-dim": "#ffb77a",
                        "inverse-surface": "#2b3234",
                        "on-background": "#161d1f",
                        "on-secondary-fixed": "#2e1500",
                        "background": "#f4fafd",
                        "on-surface": "#161d1f",
                        "primary-fixed-dim": "#c1c1ff",
                        "tertiary-fixed": "#73fe84",
                        "surface-container-high": "#e2e9ec",
                        "surface-dim": "#d4dbdd",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#dde4e6",
                        "outline-variant": "#c7c4d7",
                        "inverse-primary": "#c1c1ff",
                        "outline": "#767586",
                        "inverse-on-surface": "#ebf2f4",
                        "secondary-fixed": "#ffdcc2",
                        "on-surface-variant": "#464555",
                        "surface-bright": "#f4fafd"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "margin-desktop": "64px",
                        "gutter": "24px"
                    },
                    fontFamily: {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.01em", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "1.2", fontWeight: "700" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "label-sm": ["12px", { lineHeight: "1.1", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "700" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "800" }]
                    }
                }
            }
        }
    </script>
<style>
        .math-font { font-family: 'Times New Roman', Times, serif; }
        .hard-shadow { box-shadow: 4px 4px 0px var(--tw-shadow-color); }
        .border-card { border: 2px solid theme('colors.primary-fixed-dim'); }
        .border-active { border: 2px solid theme('colors.primary'); }
        /* Hide default radio circle */
        input[type="radio"] { appearance: none; margin: 0; }
        /* Custom radio button styles below */
    </style>
</head>
<body class="bg-surface h-full flex flex-col font-body-md text-body-md text-on-surface">
<!-- Sticky Header -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface-container-lowest border-b-2 border-outline-variant shadow-sm h-20 flex flex-col justify-center">
<div class="max-w-[1440px] mx-auto w-full px-margin-mobile md:px-margin-desktop flex justify-between items-center h-full">
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md text-primary font-bold">AP Calculus BC Practice Exam</span>
</div>
<div class="flex items-center gap-8">
<div class="flex flex-col items-end">
<span class="font-label-md text-label-md text-on-surface-variant">Time Remaining</span>
<span class="font-headline-md text-headline-md text-secondary-container font-bold flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
                        45:20
                    </span>
</div>
<button class="bg-surface-container hover:bg-surface-variant text-on-surface font-label-md text-label-md py-2 px-4 rounded-lg flex items-center gap-2 border-2 border-outline-variant transition-colors">
<span class="material-symbols-outlined">pause</span> Pause
                </button>
</div>
</div>
<!-- Progress Bar (Thin) -->
<div class="h-1 bg-surface-variant w-full absolute bottom-0 left-0">
<div class="h-full bg-primary" style="width: 13.33%;"></div> <!-- 4 / 30 = ~13% -->
</div>
</header>
<!-- Main Layout Container -->
<div class="flex-1 flex mt-20 h-[calc(100vh-80px)] overflow-hidden">
<!-- Left Sidebar: Question Navigator -->
<aside class="w-72 bg-surface-container-low border-r-2 border-outline-variant flex flex-col h-full overflow-y-auto">
<div class="p-6 border-b-2 border-outline-variant">
<div class="flex justify-between items-center mb-4">
<h2 class="font-label-md text-label-md text-on-surface">Question Navigator</h2>
<span class="font-label-md text-label-md text-primary bg-primary-fixed px-2 py-1 rounded-full">4 of 30</span>
</div>
<!-- Legend -->
<div class="grid grid-cols-2 gap-2 mb-4 font-label-sm text-label-sm text-on-surface-variant">
<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-tertiary-container"></div> Answered</div>
<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div> Unanswered</div>
<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-primary border-2 border-primary"></div> Current</div>
<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-secondary-container"></div> Flagged</div>
</div>
</div>
<div class="p-6">
<!-- Question Grid -->
<div class="grid grid-cols-5 gap-3">
<!-- Example grid items with different states -->
<!-- Answered -->
<button class="w-10 h-10 rounded-lg bg-tertiary-container text-on-tertiary font-label-md text-label-md flex items-center justify-center hover:bg-tertiary transition-colors shadow-sm">1</button>
<button class="w-10 h-10 rounded-lg bg-tertiary-container text-on-tertiary font-label-md text-label-md flex items-center justify-center hover:bg-tertiary transition-colors shadow-sm">2</button>
<button class="w-10 h-10 rounded-lg bg-secondary-container text-on-secondary font-label-md text-label-md flex items-center justify-center hover:bg-secondary transition-colors shadow-sm relative">
                        3
                        <span class="absolute -top-1 -right-1 w-3 h-3 bg-error rounded-full border-2 border-surface-container-low"></span> <!-- Flag indicator -->
</button>
<!-- Current -->
<button class="w-10 h-10 rounded-lg bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center border-2 border-primary shadow-md transform scale-110">4</button>
<!-- Unanswered -->
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">5</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">6</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">7</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">8</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">9</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">10</button>
<!-- More generic unanswered buttons to fill grid -->
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">11</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">12</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">13</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">14</button>
<button class="w-10 h-10 rounded-lg bg-surface-container-lowest text-on-surface border-2 border-outline-variant font-label-md text-label-md flex items-center justify-center hover:bg-surface-variant transition-colors">15</button>
</div>
</div>
<div class="mt-auto p-6 border-t-2 border-outline-variant">
<button class="w-full bg-error-container text-on-error-container hover:bg-error hover:text-on-error font-label-md text-label-md py-3 rounded-lg border-2 border-error-container transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">flag</span> Flag for Review
                </button>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 bg-surface overflow-y-auto p-6 md:p-12 relative flex flex-col">
<div class="max-w-4xl mx-auto w-full flex-1 flex flex-col">
<!-- Question Area -->
<div class="bg-surface-container-lowest border-card rounded-[24px] p-8 mb-8 shadow-primary-fixed-dim hard-shadow">
<div class="flex justify-between items-start mb-6">
<div class="flex items-center gap-3">
<span class="bg-primary text-on-primary font-label-sm text-label-sm px-3 py-1 rounded-full uppercase tracking-widest">Question 4</span>
<span class="text-on-surface-variant font-label-sm text-label-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">local_offer</span> Integration
                            </span>
<span class="bg-secondary-container/20 text-secondary border border-secondary-container font-label-sm text-label-sm px-2 py-0.5 rounded-full">Medium</span>
</div>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-6">Evaluate the following definite integral:</h3>
<!-- Math Display / LaTeX placeholder -->
<div class="my-8 py-6 px-8 bg-surface-container rounded-xl flex justify-center items-center border-2 border-outline-variant">
<span class="math-font text-3xl text-on-surface flex items-center gap-2">
<span class="text-4xl">∫</span>
<div class="flex flex-col text-sm -ml-1 mr-2 mt-2">
<span>1</span>
<span class="mt-4">0</span>
</div>
<span>x<sup>2</sup> e<sup>x</sup> dx</span>
</span>
</div>
</div>
<!-- Answer Area (Bento Style Layout) -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
<!-- Multiple Choice Column -->
<div class="space-y-4">
<h4 class="font-label-md text-label-md text-on-surface-variant mb-2">Select one option:</h4>
<label class="block relative group cursor-pointer">
<input class="peer absolute opacity-0 w-0 h-0" name="answer" type="radio" value="a"/>
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-4 flex items-center gap-4 transition-all hover:bg-surface-container-low peer-checked:border-active peer-checked:bg-primary-container/10 peer-checked:hard-shadow shadow-primary">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary peer-checked:border-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">A</div>
<span class="font-body-lg text-body-lg text-on-surface math-font">e - 2</span>
</div>
</label>
<label class="block relative group cursor-pointer">
<input class="peer absolute opacity-0 w-0 h-0" name="answer" type="radio" value="b"/>
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-4 flex items-center gap-4 transition-all hover:bg-surface-container-low peer-checked:border-active peer-checked:bg-primary-container/10 peer-checked:hard-shadow shadow-primary">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary peer-checked:border-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">B</div>
<span class="font-body-lg text-body-lg text-on-surface math-font">2e - 1</span>
</div>
</label>
<label class="block relative group cursor-pointer">
<input class="peer absolute opacity-0 w-0 h-0" name="answer" type="radio" value="c"/>
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-4 flex items-center gap-4 transition-all hover:bg-surface-container-low peer-checked:border-active peer-checked:bg-primary-container/10 peer-checked:hard-shadow shadow-primary">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary peer-checked:border-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">C</div>
<span class="font-body-lg text-body-lg text-on-surface math-font">e - 1</span>
</div>
</label>
<label class="block relative group cursor-pointer">
<input class="peer absolute opacity-0 w-0 h-0" name="answer" type="radio" value="d"/>
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-4 flex items-center gap-4 transition-all hover:bg-surface-container-low peer-checked:border-active peer-checked:bg-primary-container/10 peer-checked:hard-shadow shadow-primary">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary peer-checked:border-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">D</div>
<span class="font-body-lg text-body-lg text-on-surface math-font">e + 2</span>
</div>
</label>
</div>
<!-- Alternate Input / Show your work (optional based on question type, shown here for robust UI) -->
<div class="flex flex-col">
<h4 class="font-label-md text-label-md text-on-surface-variant mb-2">Or enter manual answer:</h4>
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl overflow-hidden flex-1 flex flex-col focus-within:border-primary focus-within:ring-2 focus-within:ring-primary-fixed transition-all">
<!-- Math Toolbar -->
<div class="bg-surface-container-low border-b-2 border-outline-variant p-2 flex flex-wrap gap-2">
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Square Root">√</button>
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Pi">π</button>
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Fraction">a/b</button>
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Exponent">x²</button>
<div class="w-px bg-outline-variant mx-1"></div>
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Integral">∫</button>
<button class="p-2 hover:bg-surface-variant rounded text-on-surface font-label-md text-label-md math-font" title="Infinity">∞</button>
</div>
<!-- Input Field -->
<textarea class="w-full flex-1 p-4 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg math-font text-on-surface resize-none" placeholder="Type answer or formula here..."></textarea>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Actions -->
<div class="mt-auto bg-surface-container-lowest border-t-2 border-outline-variant p-6 -mx-6 md:-mx-12 sticky bottom-0 flex justify-between items-center z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="bg-surface-container hover:bg-surface-variant text-on-surface font-label-md text-label-md py-3 px-6 rounded-lg border-2 border-outline-variant transition-colors flex items-center gap-2 hover:-translate-y-[2px]">
<span class="material-symbols-outlined">arrow_back</span> Previous
                </button>
<button class="bg-primary hover:bg-primary-fixed-dim text-on-primary hover:text-on-surface font-label-md text-label-md py-3 px-8 rounded-lg shadow-primary-fixed-dim hard-shadow transition-all hover:-translate-y-[2px] flex items-center gap-2">
                    Next Question <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
</div>
</body></html>
