<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MathScore Assessment</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "on-background": "#161d1f",
                        "outline": "#767586",
                        "on-primary-fixed": "#07006c",
                        "on-secondary-container": "#6b3900",
                        "surface-dim": "#d4dbdd",
                        "background": "#f4fafd",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#ebf2f4",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c1c1ff",
                        "on-tertiary-container": "#e5ffe0",
                        "secondary-fixed-dim": "#ffb77a",
                        "tertiary-container": "#00842e",
                        "outline-variant": "#c7c4d7",
                        "surface-variant": "#dde4e6",
                        "primary-container": "#5d5fef",
                        "on-tertiary-fixed-variant": "#005319",
                        "primary": "#4343d5",
                        "surface-container": "#e8eff1",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#c1c1ff",
                        "inverse-surface": "#2b3234",
                        "on-secondary": "#ffffff",
                        "surface": "#f4fafd",
                        "secondary-container": "#fc9d41",
                        "secondary": "#8f4e00",
                        "surface-container-high": "#e2e9ec",
                        "surface-container-highest": "#dde4e6",
                        "on-primary-container": "#faf7ff",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#6d3a00",
                        "secondary-fixed": "#ffdcc2",
                        "on-secondary-fixed": "#2e1500",
                        "surface-tint": "#4849da",
                        "primary-fixed": "#e1e0ff",
                        "tertiary-fixed": "#73fe84",
                        "tertiary-fixed-dim": "#55e16b",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed": "#002106",
                        "on-surface": "#161d1f",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#2e2bc2",
                        "surface-container-low": "#eef5f7",
                        "surface-bright": "#f4fafd",
                        "tertiary": "#006822"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "unit": "4px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.1", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Minimal Distraction-Free Header -->
<header class="bg-surface-container-lowest border-b-2 border-outline-variant px-margin-mobile md:px-margin-desktop h-20 flex items-center justify-between sticky top-0 z-50">
<button aria-label="Close Test" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant group">
<span class="material-symbols-outlined group-hover:text-error transition-colors">close</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface hidden md:block">SAT Algebra Test</h1>
<div class="flex items-center gap-2 bg-surface-container px-4 py-2 rounded-lg border-2 border-surface-variant">
<span class="material-symbols-outlined text-primary">timer</span>
<span class="font-headline-md text-headline-md text-on-surface tabular-nums">25:00</span>
</div>
</header>
<!-- Main Assessment Canvas -->
<main class="flex-grow flex flex-col items-center py-12 px-margin-mobile md:px-gutter w-full">
<div class="w-full max-w-3xl flex flex-col gap-8">
<!-- Progress Section -->
<div class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<span class="font-label-md text-label-md text-on-surface-variant">Question 1 of 20</span>
<span class="bg-error/10 text-error px-3 py-1 rounded-full font-label-sm text-label-sm uppercase tracking-wider">Hard</span>
</div>
<!-- Thick Progress Bar -->
<div class="w-full h-3 bg-surface-variant rounded-full overflow-hidden">
<div class="w-[5%] h-full bg-primary rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Question Card (Level 1 Surface) -->
<div class="bg-surface-container-lowest border-2 border-outline-variant rounded-[24px] p-6 md:p-10 flex flex-col gap-8">
<!-- Question Content -->
<div class="prose prose-lg max-w-none">
<p class="font-body-lg text-body-lg text-on-surface">
                        If <span class="font-bold bg-surface-container px-2 py-1 rounded">3x - y = 12</span> and <span class="font-bold bg-surface-container px-2 py-1 rounded">y = 3/2x</span>, what is the value of <span class="font-bold">x</span>?
                    </p>
</div>
<!-- Multiple Choice Options -->
<div class="flex flex-col gap-4">
<!-- Option A (Unselected State) -->
<label class="group relative flex items-center gap-4 p-5 rounded-xl border-2 border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-all duration-200">
<input class="sr-only peer" name="answer" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors peer-checked:hidden">
<span class="font-label-md text-label-md text-on-surface-variant">A</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface flex-grow">2</span>
</label>
<!-- Option B (Selected State - Level 2 Hard Shadow) -->
<label class="group relative flex items-center gap-4 p-5 rounded-xl border-2 border-primary bg-primary-fixed/10 shadow-[4px_4px_0px_0px_#4343d5] cursor-pointer transition-all duration-200 -translate-y-[2px]">
<input checked="" class="sr-only peer" name="answer" type="radio"/>
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-bold flex-grow">4</span>
<!-- Visual indicator for selected option letter -->
<span class="font-label-sm text-label-sm text-primary absolute right-5 top-1/2 -translate-y-1/2 opacity-50">Option B</span>
</label>
<!-- Option C (Unselected State) -->
<label class="group relative flex items-center gap-4 p-5 rounded-xl border-2 border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-all duration-200">
<input class="sr-only peer" name="answer" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors peer-checked:hidden">
<span class="font-label-md text-label-md text-on-surface-variant">C</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface flex-grow">6</span>
</label>
<!-- Option D (Unselected State) -->
<label class="group relative flex items-center gap-4 p-5 rounded-xl border-2 border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low cursor-pointer transition-all duration-200">
<input class="sr-only peer" name="answer" type="radio"/>
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors peer-checked:hidden">
<span class="font-label-md text-label-md text-on-surface-variant">D</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface flex-grow">8</span>
</label>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col-reverse sm:flex-row items-center justify-between gap-4 mt-4">
<!-- Secondary / Ghost Button -->
<button class="w-full sm:w-auto px-8 py-4 rounded-lg border-2 border-primary text-primary font-label-md text-label-md hover:bg-primary/5 transition-colors focus:ring-4 focus:ring-primary/20 outline-none">
                    Testni yakunlash
                </button>
<!-- Primary Button -->
<button class="w-full sm:w-auto px-10 py-4 rounded-lg bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-fixed-variant hover:-translate-y-[2px] transition-all shadow-sm focus:ring-4 focus:ring-primary/30 outline-none flex items-center justify-center gap-2">
                    Keyingi savol
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
