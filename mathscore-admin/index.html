<!doctype html>
<html class="light" lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathScore Admin Portal</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Three.js & Vanta Clouds2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds2.min.js"></script>
  </head>
  <body class="bg-background text-on-surface antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Xavfsizlik va F12, Right Click ni bloklash
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', function(event) {
        if (event.keyCode == 123) { // F12
          event.preventDefault(); return false;
        }
        if (event.ctrlKey && event.shiftKey && (event.keyCode == 73 || event.keyCode == 74 || event.keyCode == 67)) { // Ctrl+Shift+I/J/C
          event.preventDefault(); return false;
        }
        if (event.ctrlKey && event.keyCode == 85) { // Ctrl+U
          event.preventDefault(); return false;
        }
      });
    </script>
  </body>
</html>
